<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Для Полечки ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>

  <style>

    body{
      background:#141019;            /* любой зазор за hero — ночь, не крем */
    }

    .hero{
      width:100%;
      height:100vh;
      height:100svh;
      position:relative;
      overflow:hidden;
    }

    .hero-media{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:118%;                   /* запас под параллакс, чтобы не было зазоров */
      z-index:0;
    }

    .hero-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      animation:zoom 16s ease-in-out infinite alternate;
    }

    @keyframes zoom{
      from{ transform:scale(1); }
      to{ transform:scale(1.08); }
    }

    .hero-veil{                      /* мягкая виньетка + закатная тяжесть снизу */
      position:absolute;
      inset:0;
      z-index:1;
      background:
        radial-gradient(120% 85% at 50% 28%,
          rgba(20,16,25,0) 0%,
          rgba(20,16,25,.12) 52%,
          rgba(20,16,25,.62) 100%),
        linear-gradient(to bottom,
          rgba(20,16,25,.28) 0%,
          rgba(20,16,25,.08) 34%,
          rgba(20,16,25,.58) 100%);
    }

    .hero-content{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      z-index:2;
      text-align:center;
      color:#fff;
      width:90%;
      max-width:760px;
    }

    .hero-content .divider{
      color:var(--champagne);
      margin-bottom:34px;
      opacity:.9;
    }

    .hero-content h1{
      font-family:'Cormorant Garamond',serif;
      font-weight:600;
      font-size:clamp(54px, 8.5vw, 94px);
      line-height:1.03;
      letter-spacing:.5px;
      margin-bottom:24px;
      text-shadow:0 2px 30px rgba(0,0,0,.35);
    }

    .hero-content p{
      font-size:clamp(16px, 2vw, 20px);
      line-height:1.8;
      font-weight:300;
      color:rgba(255,255,255,.86);
      max-width:600px;
      margin:0 auto 42px;
    }

    /* подсказка скролла */
    .scroll-cue{
      position:absolute;
      left:50%;
      bottom:34px;
      transform:translateX(-50%);
      z-index:2;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      color:rgba(255,255,255,.78);
      font-size:12px;
      letter-spacing:3px;
      text-transform:uppercase;
    }

    .scroll-cue .track{
      width:1px;
      height:40px;
      position:relative;
      overflow:hidden;
      background:linear-gradient(to bottom, rgba(255,255,255,.35), transparent);
    }

    .scroll-cue .track::after{
      content:"";
      position:absolute;
      left:-1px;
      top:0;
      width:3px;
      height:12px;
      border-radius:2px;
      background:var(--champagne);
      animation:cue 2.6s var(--ease) infinite;
    }

    @keyframes cue{
      0%{ transform:translateY(-14px); opacity:0; }
      30%{ opacity:1; }
      80%{ opacity:.15; }
      100%{ transform:translateY(44px); opacity:0; }
    }

    /* кнопка музыки — без изменений */
    .music-button{
      position:fixed;
      right:22px;
      bottom:22px;
      width:52px;
      height:52px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(14px);
      color:white;
      font-size:22px;
      cursor:pointer;
      z-index:9999;
      transition:0.4s;
      border:1px solid rgba(255,255,255,0.12);
    }
    .music-button:hover{
      transform:scale(1.08);
      background:rgba(255,255,255,0.22);
    }

    @media(max-width:768px){
      .hero-content p{ line-height:1.75; }
    }

  </style>
</head>

<body>

  <div class="page-fade" aria-hidden="true"></div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <button class="music-button" onclick="toggleMusic()">
    ♪
  </button>

  <section class="hero">

    <div class="hero-media" data-parallax="-0.12">
      <img src="hero-main.jpg" alt="">
    </div>

    <div class="hero-veil"></div>

    <div class="hero-content">

      <div class="divider" data-reveal aria-hidden="true"><span>❤</span></div>

      <h1 data-reveal class="d1">Для Полечки ❤️</h1>

      <p data-reveal class="d2">
        Наша история началась случайно.
        Но стала самым важным событием в моей жизни.
      </p>

      <a href="story.html" class="btn btn--ghost" data-reveal>
        Начать путешествие
      </a>

    </div>

    <div class="scroll-cue" aria-hidden="true">
      <span>love story</span>
      <span class="track"></span>
    </div>

  </section>

  <script>

    const music = document.getElementById('bgMusic');

    music.volume = 0.45;

    const savedTime = localStorage.getItem('musicTime');

    if(savedTime){

      music.currentTime = savedTime;

    }

    const wasPlaying = localStorage.getItem('musicPlaying');

    if(wasPlaying === 'true'){

      function resumeMusic(){

        music.play();

        document.removeEventListener('click', resumeMusic);
        document.removeEventListener('touchstart', resumeMusic);

      }

      document.addEventListener('click', resumeMusic);

      document.addEventListener('touchstart', resumeMusic);

    }

    function toggleMusic(){

      if(music.paused){

        music.play();

        localStorage.setItem('musicPlaying', 'true');

      } else {

        music.pause();

        localStorage.setItem('musicPlaying', 'false');

      }

    }

    setInterval(() => {

      localStorage.setItem('musicTime', music.currentTime);

    }, 500);

  </script>

</body>
</html>
